/* ============ CHUNK SYSTEM ============ */
const chunks = new Map();
function gcx(x)  { return Math.floor(x / CHUNK_W); }
function glx(x)  { return ((x % CHUNK_W) + CHUNK_W) % CHUNK_W; }
function ens(cx) { if(!chunks.has(cx)) genChunk(cx); }
function gB(x,y) {
  if(y<0) return B.AIR;
  if(y>=WH) return B.BEDROCK;
  const cx=gcx(x); ens(cx);
  return chunks.get(cx)[y*CHUNK_W+glx(x)];
}
function sB(x,y,id) {
  if(y<0||y>=WH) return;
  const cx=gcx(x); ens(cx);
  chunks.get(cx)[y*CHUNK_W+glx(x)]=id;
}

/* ============ NOISE ============ */
function hsh(n) {
  n=((Math.abs(n|0))&0x7fffffff);
  n=((n>>16)^n)*0x45d9f3b|0;
  n=((n>>16)^n)*0x45d9f3b|0;
  n=(n>>16)^n;
  return (n>>>0)/0xFFFFFFFF;
}
function snN(x,sc,sd) {
  const ix=Math.floor(x/sc), fx=x/sc-ix, sx=fx*fx*(3-2*fx);
  return hsh(ix+sd*9973)*(1-sx)+hsh(ix+1+sd*9973)*sx;
}
function getBiome(x) {
  const n=snN(x,180,99);
  if(n<0.28) return 'desert';
  if(n>0.72) return 'mountain';
  if(n>0.55) return 'forest';
  return 'plains';
}
function tH(x) {
  const b=getBiome(x);
  let base=38,a1=12,a2=5;
  if(b==='desert')   {base=42;a1=4; a2=2;}
  if(b==='mountain') {base=26;a1=24;a2=8;}
  if(b==='forest')   {base=36;a1=10;a2=4;}
  return Math.max(8,Math.min(WH-8,Math.floor(base+snN(x,48,1)*a1+snN(x,20,2)*a2+snN(x,8,3)*2)));
}

/* ============ WORLD GEN ============ */
function genChunk(cx) {
  const d=new Uint8Array(CHUNK_W*WH);
  chunks.set(cx,d);
  for(let lx=0;lx<CHUNK_W;lx++) {
    const x=cx*CHUNK_W+lx, bio=getBiome(x), sy=tH(x);
    for(let y=0;y<WH;y++) {
      let bl=B.AIR;
      if(y>=WH-1) { bl=B.BEDROCK; }
      else if(y>sy) {
        const dep=y-sy;
        if(dep<=3) bl=(bio==='desert')?B.SAND:B.DIRT;
        else {
          bl=B.STONE;
          const r=hsh(x*1000+y+111);
          if(dep>38&&r<0.012) bl=B.DIAMOND;
          else if(dep>24&&r<0.025) bl=B.GOLD;
          else if(dep>10&&r<0.05)  bl=B.IRON;
          else if(r<0.07) bl=B.COAL;
          if(hsh(x*777+y*333+22)<0.025) bl=B.GRAVEL;
          if(sy>=40&&dep>=2&&dep<=5&&hsh(x*444+y+33)<0.22) bl=B.CLAY;
        }
      } else if(y===sy) {
        if(bio==='desert') bl=B.SAND;
        else if(bio==='mountain'&&sy<24) bl=B.SNOW;
        else bl=B.GRASS;
      }
      d[y*CHUNK_W+lx]=bl;
    }
    // Water fill
    if(sy>=40) for(let y=sy+1;y<=44;y++) if(d[y*CHUNK_W+lx]===B.AIR) d[y*CHUNK_W+lx]=B.WATER;
    // Surface features
    const sr=hsh(x*31337+555);
    const canT=lx>=2&&lx<=CHUNK_W-3;
    if(canT&&bio==='forest'&&d[sy*CHUNK_W+lx]===B.GRASS&&sr<0.12)  placeTree(d,cx,x,sy-1);
    else if(canT&&bio==='plains'&&d[sy*CHUNK_W+lx]===B.GRASS&&sr<0.05) placeTree(d,cx,x,sy-1);
    else if(bio==='desert'&&sr<0.05&&sy<40) {
      const ch=2+Math.floor(hsh(x*12345+1)*2);
      for(let i=0;i<ch;i++) { const cy=sy-i; if(cy>=0&&d[cy*CHUNK_W+lx]===B.AIR) d[cy*CHUNK_W+lx]=B.CACTUS; }
    }
    // Underground mushrooms
    if(hsh(x*9999+777)<0.02) {
      const my=sy+8+Math.floor(hsh(x*8888+11)*14);
      if(my<WH-2&&d[my*CHUNK_W+lx]===B.AIR&&d[(my+1)*CHUNK_W+lx]!==B.AIR) d[my*CHUNK_W+lx]=B.MUSHROOM;
    }
  }
  // Caves
  for(let ci=0;ci<3;ci++) {
    let cvx=cx*CHUNK_W+hsh(cx*101+ci*33)*CHUNK_W*2-CHUNK_W*0.5;
    let cvy=50+hsh(cx*202+ci*44)*22;
    let ang=hsh(cx*303+ci*55)*Math.PI*2;
    for(let j=0;j<60;j++) {
      ang+=(hsh(ci*1000+j+cx*7)-0.5)*0.75;
      cvx+=Math.cos(ang)*1.6; cvy+=Math.sin(ang)*1.0;
      const r=2+Math.floor(hsh(ci*500+j+cx*13)*2);
      for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++) {
        if(dx*dx+dy*dy>r*r) continue;
        const bx=Math.floor(cvx+dx), by=Math.floor(cvy+dy);
        if(by<5||by>=WH-1) continue;
        if(gcx(bx)!==cx) continue;
        const ll=glx(bx);
        if(d[by*CHUNK_W+ll]!==B.BEDROCK) d[by*CHUNK_W+ll]=B.AIR;
      }
    }
  }
}

function placeTree(d,cx,x,baseY) {
  const h=4+Math.floor(hsh(x*555+baseY*111)*2);
  for(let i=0;i<h;i++) {
    const y=baseY-i; if(y<0||y>=WH) continue;
    if(gcx(x)===cx) d[y*CHUNK_W+glx(x)]=B.LOG;
  }
  const top=baseY-h;
  for(let dy=-2;dy<=1;dy++) for(let dx=-2;dx<=2;dx++) {
    if(Math.abs(dx)+Math.abs(dy)>3) continue;
    const lx2=x+dx, ly2=top+dy;
    if(ly2<0||ly2>=WH||gcx(lx2)!==cx) continue;
    if(d[ly2*CHUNK_W+glx(lx2)]===B.AIR) d[ly2*CHUNK_W+glx(lx2)]=B.LEAVES;
  }
}

/* ============ PHYSICS ============ */
function isSolid(x,y) {
  if(x<-9999||x>9999||y<0) return y>=WH;
  if(y>=WH) return true;
  const b=gB(x,y);
  return b&&BD[b]&&BD[b].solid;
}
function inWater(bx,by) {
  if(by<0||by>=WH) return false;
  return gB(bx,by)===B.WATER;
}

function physStep(e) {
  const mx=Math.floor((e.x+e.w/2)/BS), my=Math.floor((e.y+e.h*0.6)/BS);
  e.inWater=inWater(mx,my);
  e.vy+=e.inWater?GRAV*0.18:GRAV;
  if(e.inWater){e.vy*=0.82;e.vx*=0.82;}
  e.vy=Math.min(e.vy,20);

  e.x+=e.vx;
  const ly=Math.floor((e.y+2)/BS), ry=Math.floor((e.y+e.h-2)/BS);
  for(let by=ly;by<=ry;by++) {
    if(isSolid(Math.floor(e.x/BS),by))         {e.x=Math.floor(e.x/BS)*BS+BS;e.vx=0;}
    if(isSolid(Math.floor((e.x+e.w-1)/BS),by)) {e.x=Math.floor((e.x+e.w-1)/BS)*BS-e.w;e.vx=0;}
  }
  e.onGround=false;
  e.y+=e.vy;
  const lx2=Math.floor((e.x+1)/BS), rx2=Math.floor((e.x+e.w-1)/BS);
  for(let bx=lx2;bx<=rx2;bx++) {
    if(isSolid(bx,Math.floor(e.y/BS)))       {e.y=Math.floor(e.y/BS)*BS+BS;e.vy=0;}
    if(isSolid(bx,Math.floor((e.y+e.h)/BS))){e.y=Math.floor((e.y+e.h)/BS)*BS-e.h;e.vy=0;e.onGround=true;}
  }
}

/* ============ PLAYER UPDATE ============ */
function updPlayer() {
  if(player.dead) return;
  const sp=player.inWater?SPD*0.45:SPD;
  if(keys['ArrowLeft']||keys['KeyA'])  {player.vx=-sp;player.facing=-1;}
  else if(keys['ArrowRight']||keys['KeyD']){player.vx=sp;player.facing=1;}
  else {player.vx*=0.65;if(Math.abs(player.vx)<0.1)player.vx=0;}
  if((keys['ArrowUp']||keys['KeyW']||keys['Space'])&&player.onGround){player.vy=JUMP;player.onGround=false;}
  if(player.inWater&&(keys['ArrowUp']||keys['KeyW']||keys['Space']))player.vy=-3;

  physStep(player);
  if(player.y>WH*BS+300) respawn();

  // Camera
  cam.x=player.x+player.w/2-Wpx/2;
  cam.y=player.y+player.h/2-Hpx/2;
  cam.y=Math.max(0,Math.min(WH*BS-Hpx,cam.y));

  // Pre-gen chunks around player
  const pcx=gcx(Math.floor(player.x/BS));
  for(let i=-4;i<=4;i++) ens(pcx+i);

  // Target block
  const wx=mouse.x+cam.x, wy=mouse.y+cam.y;
  const tbx=Math.floor(wx/BS), tby=Math.floor(wy/BS);
  const cx2=player.x+player.w/2, cy2=player.y+player.h/2;
  if(Math.hypot(tbx*BS+BS/2-cx2,tby*BS+BS/2-cy2)<BS*7&&tby>=0&&tby<WH) targetBlock={x:tbx,y:tby};
  else targetBlock=null;

  // Mining
  if(mouse.left&&targetBlock&&!showInv&&!showTool) {
    const bx=targetBlock.x, by=targetBlock.y, b=gB(bx,by);
    if(b&&b!==B.AIR) {
      const held=player.inventory[player.hotbar];
      const sp2=(held&&held.type==='tool')?held.speed||1:1;
      breakTmr++;
      breakProg=breakTmr/(BD[b].hard*10/sp2);
      if(breakProg>=1){mineBlock(bx,by);breakTmr=0;breakProg=0;}
    }
  } else {breakTmr=0;breakProg=0;}

  // Fall damage
  if(player.onGround&&player.lastVy>13) doDmgPlayer(Math.floor((player.lastVy-13)*0.2));
  player.lastVy=player.vy;

  // Food decay
  player.foodDecay++;
  if(player.foodDecay>1200){player.foodDecay=0;if(player.food>0)player.food--;}
  if(player.food===0&&tick%120===0) doDmgPlayer(1);

  if(player.atk>0) player.atk--;
  if(player.dmgCD>0) player.dmgCD--;
}

function respawn() {
  const sy=tH(0);
  player.x=0; player.y=(sy-4)*BS;
  player.vx=0;player.vy=0;
  player.health=player.maxHealth; player.food=20; player.dead=false;
  msg('Respawned! 🌍');
}

function doDmgPlayer(d) {
  if(player.dmgCD>0) return;
  player.health=Math.max(0,player.health-d);
  player.dmgCD=40;
  if(player.health<=0){player.dead=true;msg('☠ You died! Press R to respawn.');}
}

function mineBlock(bx,by) {
  const b=gB(bx,by);
  if(!b||b===B.AIR||b===B.BEDROCK) return;
  const def=BD[b];
  // Drops
  if(b===B.LEAVES) {
    if(hsh(tick*111+bx*222+by)<0.25) {addInv({type:'food',id:'apple',count:1,name:'Apple',restore:4,color:'#DD2200',icon:'🍎'});msg('Found an Apple! 🍎');}
  } else if(b===B.MUSHROOM) {
    addInv({type:'food',id:'mushroom',count:1,name:'Mushroom',restore:3,color:'#AA3322',icon:'🍄'});
  } else {
    const drop=def.drop!==undefined?def.drop:b;
    if(drop!==B.AIR) addInv({type:'block',id:drop,count:1});
  }
  sB(bx,by,B.AIR);
  msg('Mined: '+def.name);
}

function placeBlock(bx,by) {
  if(by<0||by>=WH) return;
  if(gB(bx,by)!==B.AIR) return;
  const px=Math.floor(player.x/BS), py=Math.floor(player.y/BS);
  if(bx>=px-1&&bx<=px+1&&by>=py&&by<=py+2) return;
  const item=player.inventory[player.hotbar];
  if(!item||item.type!=='block'){msg('Equip a block to place!');return;}
  sB(bx,by,item.id);
  item.count--; if(item.count<=0) player.inventory[player.hotbar]=null;
}

function eatHeld() {
  const item=player.inventory[player.hotbar];
  if(!item||item.type!=='food'){msg('Hold a food item to eat! (G)');return;}
  const restore=item.restore||4;
  player.food=Math.min(player.maxFood, player.food+restore);
  player.health=Math.min(player.maxHealth, player.health+(restore>5?2:1));
  msg(`Ate ${item.name}! +${restore} food 🍴`);
  item.count--;
  if(item.count<=0) player.inventory[player.hotbar]=null;
}

function attackNearby() {
  const held=player.inventory[player.hotbar];
  const dmg=(held&&held.type==='weapon')?held.damage:1;
  const cx2=player.x+player.w/2, cy2=player.y+player.h/2;
  let hit=false;
  entities.filter(e=>e.hostile&&!e.dead&&!e.isProjectile).forEach(e=>{
    const ex=e.x+e.w/2, ey=e.y+e.h/2;
    if(Math.hypot(cx2-ex,cy2-ey)<BS*3.5){dmgEnt(e,dmg);hit=true;msg(`Hit ${e.name} for ${dmg}! ⚔`);}
  });
  if(!hit) msg('No enemies in range! Use F/Z to attack.');
}

function interactNearby() {
  // Right-click: interact with passive mobs or place block
  if(targetBlock&&gB(targetBlock.x,targetBlock.y)===B.AIR) {
    placeBlock(targetBlock.x,targetBlock.y); return;
  }
  const cx2=player.x+player.w/2, cy2=player.y+player.h/2;
  for(const e of entities) {
    if(e.dead||e.hostile) continue;
    const ex=e.x+e.w/2, ey=e.y+e.h/2;
    if(Math.hypot(cx2-ex,cy2-ey)<BS*4) {
      const lines=MOB_TALK[e.type]||[];
      const line=lines[Math.floor(Math.random()*lines.length)]||'...';
      showPop(line,e.x+e.w/2,e.y-10);
      msg(`${e.name}: "${line.replace(/[^a-zA-Z0-9!?~.*]/g,'').substring(0,20)}"`);
      // Passive trade bonus
      if(hsh(tick*e.id)<0.2&&e.type==='COW')   {addInv({type:'food',id:'beef',count:1,name:'Beef',restore:8,color:'#AA3322',icon:'🥩'});msg('Cow gifted you some Beef! 🐮');}
      if(hsh(tick*e.id)<0.15&&e.type==='CHICKEN'){addInv({type:'food',id:'raw_chicken',count:1,name:'Raw Chicken',restore:6,color:'#DDAA77',icon:'🍗'});msg('Chicken dropped a gift! 🐔');}
      return;
    }
  }
  // Fallback: place block
  if(targetBlock) placeBlock(targetBlock.x,targetBlock.y);
}

function addInv(item) {
  // Stack food/blocks
  for(let i=0;i<36;i++) {
    const s=player.inventory[i];
    if(s&&s.id===item.id&&s.type===item.type&&s.count<64){s.count+=item.count;return true;}
  }
  for(let i=0;i<36;i++) {if(!player.inventory[i]){player.inventory[i]={...item};return true;}}
  msg('Inventory full!'); return false;
}

/* ============ ENTITY AI ============ */
function updEntities() {
  const dayF=getDayF();
  entities=entities.filter(e=>!e.dead);

  entities.forEach(e=>{
    if(e.isProjectile) return;
    physStep(e);
    if(e.dmgCD>0) e.dmgCD--;
    if(e.atkCD>0) e.atkCD--;
    if(e.aiTmr>0) e.aiTmr--;
    if(e.fleeTmr>0) e.fleeTmr--;

    const px=player.x+player.w/2, py=player.y+player.h/2;
    const ex=e.x+e.w/2, ey=e.y+e.h/2;
    const dist=Math.hypot(px-ex,py-ey);
    if(e.hostile) hostileAI(e,dist,px,py,ex,ey,dayF);
    else          passiveAI(e,dist,px,py,ex,ey);
  });

  // Keep population up
  if(tick%1200===0) {
    const pass=entities.filter(e=>!e.hostile&&!e.dead).length;
    const host=entities.filter(e=>e.hostile&&!e.dead).length;
    const p=['PIG','COW','SHEEP','CHICKEN'];
    const h=['ZOMBIE','CREEPER','SKELETON','SPIDER'];
    if(pass<20) spawnMob(p[tick%4],player);
    if(host<50) spawnMob(h[tick%4],player);
    // Cleanup far entities
    entities=entities.filter(e=>Math.hypot(e.x-player.x,e.y-player.y)<BS*200);
  }
}

function passiveAI(e,dist,px,py,ex,ey) {
  // Flee if recently hurt
  if(e.fleeTmr>0) {
    const dir=ex>px?1:-1; e.vx=dir*3.0;
    if(e.onGround) { const nx=Math.floor((e.x+e.vx+(e.vx>0?e.w:0))/BS), fy=Math.floor((e.y+e.h+1)/BS);
      if(!isSolid(nx,fy)) e.vy=-8; }
    return;
  }
  if(e.aiTmr<=0) {
    e.aiTmr=60+Math.random()*100;
    e.aiState=Math.random()<0.55?'walk':'idle';
    if(e.aiState==='walk') e.walkDir=Math.random()<0.5?-1:1;
  }
  if(e.aiState==='walk') {
    e.vx=e.walkDir*1.4;
    const nx=Math.floor((e.x+e.vx+(e.walkDir>0?e.w:0))/BS), fy=Math.floor((e.y+e.h+1)/BS);
    if(!isSolid(nx,fy)||isSolid(nx,fy-1)) e.walkDir*=-1;
  } else e.vx*=0.7;
  if(e.onGround&&Math.random()<0.003) e.vy=-5.5;
}

function hostileAI(e,dist,px,py,ex,ey,dayF) {
  if(e.type==='ZOMBIE'&&dayF>0.65&&tick%40===0) { e.health-=1; if(e.health<=0){killEnt(e);return;} }
  const agR=BS*20;
  if(dist<agR) {
    const dir=px>ex?1:-1; e.walkDir=dir;
    if(e.type==='CREEPER') {
      if(dist<BS*2.8) {
        e.explodeTmr++; e.vx*=0.7;
        if(e.explodeTmr>50){explode(e.x,e.y,5);e.dead=true;}
      } else {e.explodeTmr=0;e.vx=dir*2.8;}
    } else if(e.type==='SKELETON') {
      if(dist>BS*9) e.vx=dir*2.2; else if(dist<BS*5) e.vx=-dir*2; else e.vx*=0.7;
      if(e.atkCD<=0&&dist<BS*18&&!player.dead){fireArrow(e,px,py);e.atkCD=70;}
    } else {
      e.vx=dir*2.5;
      if(dist<BS*1.9&&e.atkCD<=0&&!player.dead){doDmgPlayer(e.dmg||2);e.atkCD=35;msg(e.name+' hit you! ❤');}
    }
    if(e.onGround) {
      const nx=Math.floor((e.x+e.vx+(e.walkDir>0?e.w:0))/BS), fy=Math.floor((e.y+e.h-1)/BS);
      if(isSolid(nx,fy)&&!isSolid(nx,fy-1)) e.vy=-9;
    }
  } else {
    if(e.aiTmr<=0){e.aiTmr=80+Math.random()*100;e.aiState=Math.random()<0.4?'walk':'idle';if(e.aiState==='walk')e.walkDir=Math.random()<0.5?-1:1;}
    if(e.aiState==='walk') e.vx=e.walkDir*1.5; else e.vx*=0.7;
  }
}

function fireArrow(from,tx,ty) {
  const ex=from.x+from.w/2, ey=from.y+from.h*0.4;
  const dx=tx-ex, dy=ty-ey, len=Math.hypot(dx,dy);
  arrows.push({x:ex,y:ey,vx:(dx/len)*9,vy:(dy/len)*9-1,w:BS*0.25,h:BS*0.12,damage:3,dead:false});
}

function updArrows() {
  arrows=arrows.filter(a=>!a.dead);
  arrows.forEach(a=>{
    a.vy+=GRAV*0.4; a.x+=a.vx; a.y+=a.vy;
    if(isSolid(Math.floor((a.x+a.w/2)/BS),Math.floor((a.y+a.h/2)/BS))){a.dead=true;return;}
    if(a.y>WH*BS){a.dead=true;return;}
    const px=player.x,py=player.y;
    if(a.x<px+player.w&&a.x+a.w>px&&a.y<py+player.h&&a.y+a.h>py){doDmgPlayer(a.damage);a.dead=true;msg('Arrow hit you! 🏹');}
  });
}

function explode(ex,ey,rad) {
  const bx=Math.floor(ex/BS), by=Math.floor(ey/BS);
  for(let dy=-rad;dy<=rad;dy++) for(let dx=-rad;dx<=rad;dx++) {
    if(dx*dx+dy*dy<=rad*rad) {const nx=bx+dx,ny=by+dy;if(ny>0&&ny<WH-1&&gB(nx,ny)!==B.BEDROCK)sB(nx,ny,B.AIR);}
  }
  const d=Math.hypot(player.x+player.w/2-ex,player.y+player.h/2-ey);
  if(d<rad*BS){doDmgPlayer(Math.ceil((1-d/(rad*BS))*10));msg('💥 BOOM! Creeper exploded!');}
}

function dmgEnt(e,d) {
  if(e.dmgCD>0||e.dead) return;
  e.health-=d; e.dmgCD=20;
  if(!e.hostile) {e.fleeTmr=200;}
  if(e.health<=0) killEnt(e);
}

function killEnt(e) {
  e.dead=true; player.xp+=e.xp||0;
  // Drops
  const drops={PIG:'porkchop',COW:'beef',CHICKEN:'raw_chicken'};
  if(drops[e.type]) {
    const fid=drops[e.type], fd=FOODS[fid];
    addInv({type:'food',id:fid,count:1+(hsh(tick*e.id)<0.3?1:0),name:fd.name,restore:fd.restore,color:fd.color,icon:fd.icon});
    msg(`${e.name} dropped ${fd.name}! ${fd.icon}`);
  }
  msg(`${e.name} defeated! +${e.xp} XP ✨`);
}

function showPop(text,wx,wy) {
  popText={text,wx,wy,life:120};
}

/* ============ DAY/NIGHT ============ */
function getDayF() {
  const n=(time%DAY)/DAY;
  if(n<0.2||n>0.8) return 0;
  return Math.sin((n-0.2)/0.6*Math.PI);
}
function getSky() {
  const f=getDayF(), bio=getBiome(Math.floor((player.x/BS)));
  let r=Math.floor(f*95+5), g=Math.floor(f*148+8), b=Math.floor(f*220+12);
  if(bio==='desert') {r=Math.min(255,r+30);g=Math.min(255,g+10);}
  if(bio==='mountain') {r=Math.max(0,r-10);g=Math.max(0,g-5);}
  return `rgb(${r},${g},${b})`;
}

/* ============ CRAFTING ============ */
function countInInv(id,type) {
  let c=0;
  player.inventory.forEach(s=>{if(s&&s.id===id&&(!type||s.type===type)) c+=s.count;});
  return c;
}
function canCraft(r) { return r.req.every(rq=>countInInv(rq.id)>=rq.count); }
function doCraft(r) {
  if(!canCraft(r)){msg('Not enough materials!');return;}
  r.req.forEach(rq=>{
    let rem=rq.count;
    for(let i=0;i<36&&rem>0;i++){
      const s=player.inventory[i];
      if(s&&s.id===rq.id){const t=Math.min(rem,s.count);s.count-=t;rem-=t;if(s.count<=0)player.inventory[i]=null;}
    }
  });
  addInv({...r.result});
  msg(`Crafted: ${r.name} ✅`);
}

/* ============ RENDERING ============ */
let stars=null;
function render() {
  ctx.clearRect(0,0,Wpx,Hpx);
  const dayF=getDayF();
  const grad=ctx.createLinearGradient(0,0,0,Hpx);
  grad.addColorStop(0,getSky());
  grad.addColorStop(1,dayF>0.1?'#87CEEB':'#0A0A22');
  ctx.fillStyle=grad; ctx.fillRect(0,0,Wpx,Hpx);

  // Stars
  if(dayF<0.35) {
    if(!stars) stars=Array.from({length:140},()=>({x:Math.random()*Wpx,y:Math.random()*Hpx*0.6,r:Math.random()*1.6+0.3,a:Math.random()*0.5+0.5}));
    const op=Math.max(0,1-dayF*3.5);
    stars.forEach(s=>{ctx.globalAlpha=s.a*op;ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
  }

  // Celestials
  const nt=(time%DAY)/DAY;
  const sa=nt*Math.PI*2-Math.PI/2;
  const sx=Wpx/2+Math.cos(sa)*Wpx*0.38, sy2=Hpx/2+Math.sin(sa)*Hpx*0.52;
  if(dayF>0.01){ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=28;ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(sx,sy2,24,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFFF88';ctx.beginPath();ctx.arc(sx,sy2,14,0,Math.PI*2);ctx.fill();ctx.restore();}
  const ma=(nt+0.5)*Math.PI*2-Math.PI/2;
  const mxp=Wpx/2+Math.cos(ma)*Wpx*0.38, myp=Hpx/2+Math.sin(ma)*Hpx*0.52;
  if(dayF<0.3){ctx.save();ctx.shadowColor='#9999FF';ctx.shadowBlur=14;ctx.fillStyle='#DDEEFF';ctx.beginPath();ctx.arc(mxp,myp,18,0,Math.PI*2);ctx.fill();ctx.restore();}

  // World
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  const vx0=Math.floor(cam.x/BS)-1, vx1=Math.ceil((cam.x+Wpx)/BS)+1;
  const vy0=Math.max(0,Math.floor(cam.y/BS)-1), vy1=Math.min(WH,Math.ceil((cam.y+Hpx)/BS)+1);

  for(let by=vy0;by<vy1;by++) {
    for(let bx=vx0;bx<vx1;bx++) {
      const b=gB(bx,by);
      if(!b) continue;
      const def=BD[b]; if(!def||!def.color) continue;
      drawBlock(b,def,bx*BS,by*BS,bx,by);
    }
  }

  // Break overlay
  if(targetBlock&&breakProg>0) {
    const bx=targetBlock.x*BS, by=targetBlock.y*BS;
    ctx.fillStyle=`rgba(0,0,0,${breakProg*0.38})`; ctx.fillRect(bx,by,BS,BS);
    ctx.strokeStyle=`rgba(0,0,0,0.7)`; ctx.lineWidth=1.5;
    for(let i=0;i<Math.ceil(breakProg*5);i++){
      ctx.beginPath();ctx.moveTo(bx+4+i*3,by+4);ctx.lineTo(bx+BS-4,by+BS-4-i*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx+BS-4-i*3,by+4);ctx.lineTo(bx+4,by+BS-4);ctx.stroke();
    }
  }

  // Entities
  entities.filter(e=>!e.dead&&!e.isProjectile).forEach(drawMob);

  // Arrows
  arrows.filter(a=>!a.dead).forEach(a=>{
    ctx.save();ctx.translate(a.x+a.w/2,a.y+a.h/2);ctx.rotate(Math.atan2(a.vy,a.vx));
    ctx.fillStyle='#7B5D3A';ctx.fillRect(-a.w/2,-1.5,a.w,3);
    ctx.fillStyle='#CCC';ctx.beginPath();ctx.moveTo(a.w/2,0);ctx.lineTo(a.w*0.3,-3);ctx.lineTo(a.w*0.3,3);ctx.fill();
    ctx.restore();
  });

  // Player
  drawPlayer();

  // Target highlight
  if(targetBlock&&!showInv&&!showTool) {
    const b=gB(targetBlock.x,targetBlock.y);
    if(b&&b!==B.AIR){ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=2.5;ctx.strokeRect(targetBlock.x*BS,targetBlock.y*BS,BS,BS);}
  }

  // Popup text
  if(popText&&popText.life>0) {
    const alpha=Math.min(1,popText.life/40);
    ctx.globalAlpha=alpha;
    ctx.font='bold 13px "Courier New"'; ctx.textAlign='center';
    const tw=ctx.measureText(popText.text).width+12;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(popText.wx-tw/2,popText.wy-18,tw,20);
    ctx.fillStyle='#FFE082'; ctx.fillText(popText.text,popText.wx,popText.wy-3);
    ctx.globalAlpha=1;
    popText.wy-=0.5; popText.life--;
  }

  ctx.restore(); // end world

  // Night overlay
  const nf=1-dayF;
  if(nf>0.55) {ctx.fillStyle=`rgba(0,0,20,${(nf-0.55)*0.75})`;ctx.fillRect(0,0,Wpx,Hpx);}

  drawUI();
}

/* ============ BLOCK DRAW ============ */
function drawBlock(b,def,px,py,bx,by) {
  ctx.save();
  ctx.fillStyle=def.color; ctx.fillRect(px,py,BS,BS);
  if(b===B.GRASS&&def.top){ctx.fillStyle=def.top;ctx.fillRect(px,py,BS,5);}
  if(def.spots){ctx.fillStyle=def.spots;[[5,6,5],[15,14,4],[7,20,5]].forEach(([ox,oy,sz])=>ctx.fillRect(px+ox,py+oy,sz,sz));}
  if(b===B.LEAVES){ctx.globalAlpha=0.8;ctx.fillStyle='#1A5A00';ctx.fillRect(px+2,py+2,BS-4,BS-4);ctx.globalAlpha=1;}
  if(b===B.LOG){ctx.strokeStyle='#3B2210';ctx.lineWidth=1;ctx.beginPath();ctx.arc(px+BS/2,py+BS/2,BS*0.32,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(px+BS/2,py+BS/2,BS*0.15,0,Math.PI*2);ctx.stroke();}
  if(b===B.WATER){ctx.fillStyle=`rgba(80,160,255,0.2)`;const wh=3+Math.sin(tick*0.05+bx*0.4)*2;ctx.fillRect(px,py,BS,wh);}
  if(b===B.TORCH){ctx.fillStyle='#5C3A1E';ctx.fillRect(px+BS/2-2,py+BS*0.25,4,BS*0.55);ctx.fillStyle='#FF9900';ctx.beginPath();ctx.arc(px+BS/2,py+BS*0.22,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFFF00';ctx.beginPath();ctx.arc(px+BS/2,py+BS*0.2,2,0,Math.PI*2);ctx.fill();}
  if(b===B.CACTUS){ctx.fillStyle='#4AAA4A';ctx.fillRect(px+4,py,BS-8,BS);ctx.fillStyle='#1A5A00';ctx.fillRect(px+6,py,BS-12,BS);ctx.strokeStyle='#2D7A0A';ctx.lineWidth=1;ctx.strokeRect(px+4,py,BS-8,BS);}
  if(b===B.SNOW){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(px,py,BS,3);}
  if(b===B.MUSHROOM){ctx.fillStyle='#CC2211';ctx.beginPath();ctx.arc(px+BS/2,py+BS*0.3,BS*0.42,Math.PI,0);ctx.fill();ctx.fillStyle='#FFF';[[10,22,4,4],[18,18,5,3],[6,18,4,3]].forEach(([ox,oy,w,h])=>ctx.fillRect(px+ox,py+oy,w,h));ctx.fillStyle='#5C3A1E';ctx.fillRect(px+BS/2-3,py+BS*0.3,6,BS*0.6);}
  if(b===B.TNT){ctx.fillStyle='#FFF';ctx.font='bold 8px Courier New';ctx.textAlign='center';ctx.fillText('TNT',px+BS/2,py+BS/2+3);}
  if(def.out){ctx.strokeStyle=def.out;ctx.lineWidth=0.6;ctx.strokeRect(px+0.5,py+0.5,BS-1,BS-1);}
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(px,py,BS,2);ctx.fillRect(px,py,2,BS);
  ctx.restore();
}

/* ============ PLAYER DRAW ============ */
function drawPlayer() {
  const px=Math.round(player.x), py=Math.round(player.y), pw=player.w, ph=player.h;
  ctx.save();
  if(player.dmgCD>0&&Math.floor(player.dmgCD/4)%2===0) ctx.globalAlpha=0.4;
  const bob=player.onGround&&Math.abs(player.vx)>0.5?Math.sin(tick*0.22)*3:0;
  // Legs
  ctx.fillStyle='#1A3A9A';
  ctx.fillRect(px+pw*0.08, py+ph*0.62+Math.sin(tick*0.2)*4*Math.sign(player.vx||1)*0.5, pw*0.37, ph*0.38);
  ctx.fillRect(px+pw*0.55, py+ph*0.62-Math.sin(tick*0.2)*4*Math.sign(player.vx||1)*0.5, pw*0.37, ph*0.38);
  // Body
  ctx.fillStyle='#557744'; ctx.fillRect(px+pw*0.05,py+ph*0.35,pw*0.9,ph*0.28);
  // Arms
  ctx.fillStyle='#C68642';
  ctx.fillRect(px-pw*0.24, py+ph*0.36+bob, pw*0.2, ph*0.24);
  ctx.fillRect(px+pw*0.98, py+ph*0.36-bob, pw*0.2, ph*0.24);
  // Head
  ctx.fillStyle='#C68642'; ctx.fillRect(px+pw*0.08,py,pw*0.84,ph*0.35);
  ctx.fillStyle='#5C3A1E'; ctx.fillRect(px+pw*0.08,py,pw*0.84,ph*0.1);
  ctx.fillStyle='#FFF';
  if(player.facing>0) {ctx.fillRect(px+pw*0.52,py+ph*0.1,pw*0.22,ph*0.11);ctx.fillStyle='#224488';ctx.fillRect(px+pw*0.58,py+ph*0.11,pw*0.12,ph*0.09);}
  else                {ctx.fillRect(px+pw*0.25,py+ph*0.1,pw*0.22,ph*0.11);ctx.fillStyle='#224488';ctx.fillRect(px+pw*0.28,py+ph*0.11,pw*0.12,ph*0.09);}
  ctx.restore();
}

/* ============ MOB DRAW ============ */
function drawMob(e) {
  const ex=Math.round(e.x),ey=Math.round(e.y),ew=e.w,eh=e.h;
  ctx.save();
  if(e.dmgCD>0&&Math.floor(e.dmgCD/4)%2===0) ctx.globalAlpha=0.35;
  if(e.explodeTmr>30){ctx.globalAlpha=0.5+Math.sin(tick*0.8)*0.5;ctx.fillStyle='#FFF';ctx.fillRect(ex-4,ey-4,ew+8,eh+8);ctx.globalAlpha=1;}
  switch(e.type){
    case 'PIG':     drawPig(ex,ey,ew,eh); break;
    case 'COW':     drawCow(ex,ey,ew,eh); break;
    case 'SHEEP':   drawSheep(ex,ey,ew,eh); break;
    case 'CHICKEN': drawChicken(ex,ey,ew,eh); break;
    case 'ZOMBIE':  drawZombie(ex,ey,ew,eh); break;
    case 'CREEPER': drawCreeper(ex,ey,ew,eh); break;
    case 'SKELETON':drawSkeleton(ex,ey,ew,eh); break;
    case 'SPIDER':  drawSpider(ex,ey,ew,eh); break;
  }
  // HP bar
  ctx.fillStyle='#222'; ctx.fillRect(ex-2,ey-9,ew+4,5);
  ctx.fillStyle=e.hostile?'#FF2200':'#00BB00'; ctx.fillRect(ex-2,ey-9,(ew+4)*(e.health/e.maxHealth),5);
  // Nametag
  ctx.font='10px "Courier New"'; ctx.textAlign='center';
  const nw=ctx.measureText(e.name).width+8;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(ex+ew/2-nw/2,ey-22,nw,13);
  ctx.fillStyle='#FFF'; ctx.fillText(e.name,ex+ew/2,ey-11);
  // Interact hint
  if(!e.hostile) {
    const px=player.x+player.w/2, py=player.y+player.h/2;
    if(Math.hypot(px-(ex+ew/2),py-(ey+eh/2))<BS*5) {
      ctx.fillStyle='rgba(255,220,0,0.9)'; ctx.font='9px Courier New'; ctx.textAlign='center';
      ctx.fillText('[RClick]',ex+ew/2,ey-28);
    }
  }
  ctx.restore();
}

function drawCow(x,y,w,h){ctx.fillStyle='#6B4A2A';ctx.fillRect(x+w*0.05,y+h*0.22,w*0.75,h*0.58);ctx.fillStyle='#F5F5F5';ctx.fillRect(x+w*0.25,y+h*0.27,w*0.28,h*0.22);ctx.fillStyle='#4A2A10';ctx.fillRect(x+w*0.6,y+h*0.04,w*0.4,h*0.38);ctx.fillStyle='#D4B060';ctx.fillRect(x+w*0.65,y,w*0.1,h*0.1);ctx.fillRect(x+w*0.84,y,w*0.1,h*0.1);[0.08,0.28,0.52,0.67].forEach(o=>{ctx.fillStyle='#4A2A10';ctx.fillRect(x+w*o,y+h*0.8,w*0.12,h*0.2);});ctx.fillStyle='#111';ctx.fillRect(x+w*0.68,y+h*0.1,w*0.09,h*0.09);}
function drawSheep(x,y,w,h){ctx.fillStyle='#DCDCDC';ctx.fillRect(x+w*0.05,y+h*0.18,w*0.75,h*0.58);[0,0.2,0.4,0.6].forEach(o=>{ctx.fillStyle='#C8C8C8';ctx.beginPath();ctx.arc(x+w*(0.12+o),y+h*0.18,w*0.13,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#888';ctx.fillRect(x+w*0.6,y+h*0.08,w*0.38,h*0.36);[0.08,0.26,0.52,0.7].forEach(o=>{ctx.fillStyle='#888';ctx.fillRect(x+w*o,y+h*0.76,w*0.11,h*0.24);});ctx.fillStyle='#111';ctx.fillRect(x+w*0.72,y+h*0.16,w*0.09,h*0.08);}
function drawChicken(x,y,w,h){ctx.fillStyle='#FFF';ctx.fillRect(x+w*0.2,y+h*0.28,w*0.6,h*0.48);ctx.fillRect(x+w*0.5,y+h*0.05,w*0.38,h*0.3);ctx.fillStyle='#FFB300';ctx.fillRect(x+w*0.85,y+h*0.17,w*0.15,h*0.08);ctx.fillStyle='#FF3300';ctx.fillRect(x+w*0.55,y,w*0.2,h*0.1);ctx.fillStyle='#FFB300';ctx.fillRect(x+w*0.28,y+h*0.76,w*0.1,h*0.24);ctx.fillRect(x+w*0.52,y+h*0.76,w*0.1,h*0.24);ctx.fillStyle='#111';ctx.fillRect(x+w*0.68,y+h*0.11,w*0.08,h*0.07);}
function drawZombie(x,y,w,h){ctx.fillStyle='#1A3A8A';ctx.fillRect(x+w*0.05,y+h*0.63,w*0.38,h*0.37);ctx.fillRect(x+w*0.57,y+h*0.63,w*0.38,h*0.37);ctx.fillStyle='#3A6A3A';ctx.fillRect(x+w*0.05,y+h*0.33,w*0.9,h*0.3);ctx.fillStyle='#2E5A2E';ctx.fillRect(x-w*0.28,y+h*0.33,w*0.25,h*0.22);ctx.fillRect(x+w,y+h*0.33,w*0.25,h*0.22);ctx.fillStyle='#3A6A3A';ctx.fillRect(x+w*0.1,y,w*0.8,h*0.35);ctx.fillStyle='#FF2200';ctx.fillRect(x+w*0.18,y+h*0.09,w*0.16,h*0.1);ctx.fillRect(x+w*0.62,y+h*0.09,w*0.16,h*0.1);ctx.fillStyle='#222';ctx.fillRect(x+w*0.2,y+h*0.23,w*0.55,h*0.06);}
function drawCreeper(x,y,w,h){ctx.fillStyle='#1A6E1A';ctx.fillRect(x+w*0.05,y+h*0.67,w*0.37,h*0.33);ctx.fillRect(x+w*0.56,y+h*0.67,w*0.37,h*0.33);ctx.fillStyle='#33AA33';ctx.fillRect(x+w*0.05,y+h*0.34,w*0.9,h*0.33);ctx.fillStyle='#2A9A2A';ctx.fillRect(x+w*0.1,y,w*0.8,h*0.36);ctx.fillStyle='#1A6E1A';ctx.fillRect(x+w*0.14,y+h*0.06,w*0.2,h*0.12);ctx.fillRect(x+w*0.62,y+h*0.06,w*0.2,h*0.12);ctx.fillRect(x+w*0.24,y+h*0.21,w*0.12,h*0.07);ctx.fillRect(x+w*0.6,y+h*0.21,w*0.12,h*0.07);ctx.fillRect(x+w*0.36,y+h*0.26,w*0.24,h*0.09);}

/* ============ UI ============ */
function drawUI() {
  drawHotbar(); drawHealth(); drawFood(); drawXPBar();
  drawClock(); drawMsgs(); drawCross(); drawMinimap(); drawBiomeTag();
  if(showInv) drawInventory();
  else if(showTool) drawToolbox();
  if(player.dead) drawDeath();
  if(!showInv&&!showTool) drawControls();
}

function drawHotbar() {
  const SZ=46,SLOTS=9,TW=SLOTS*SZ+10;
  const hx=Wpx/2-TW/2, hy=Hpx-SZ-10;
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(hx-4,hy-4,TW+8,SZ+8);
  for(let i=0;i<SLOTS;i++){
    const sx=hx+i*SZ, sy=hy;
    ctx.fillStyle=i===player.hotbar?'rgba(255,255,120,0.22)':'rgba(80,80,80,0.55)';
    ctx.fillRect(sx+1,sy+1,SZ-2,SZ-2);
    if(i===player.hotbar){ctx.strokeStyle='#FFE';ctx.lineWidth=2.5;ctx.strokeRect(sx,sy,SZ,SZ);}
    const item=player.inventory[i];
    if(item) drawItemSlot(item,sx+4,sy+4,SZ-8);
    ctx.fillStyle='#AAA';ctx.font='9px Courier New';ctx.textAlign='left';ctx.fillText(i+1,sx+4,sy+SZ-3);
  }
  // Held item name
  const held=player.inventory[player.hotbar];
  if(held){
    const nm=held.name||(held.type==='block'&&BD[held.id]?BD[held.id].name:'?');
    ctx.font='12px Courier New';ctx.textAlign='center';
    const tw=ctx.measureText(nm).width+12;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(Wpx/2-tw/2,hy-22,tw,16);
    ctx.fillStyle='#FFE';ctx.fillText(nm,Wpx/2,hy-9);
  }
}

function drawItemSlot(item,x,y,size) {
  if(item.type==='block') {
    const def=BD[item.id];if(!def||!def.color)return;
    ctx.fillStyle=def.color;ctx.fillRect(x,y,size,size);
    if(def.top&&def.top!==def.color){ctx.fillStyle=def.top;ctx.fillRect(x,y,size,4);}
    if(def.spots){ctx.fillStyle=def.spots;ctx.fillRect(x+4,y+4,6,6);ctx.fillRect(x+12,y+12,5,5);}
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(x,y,size,2);ctx.fillRect(x,y,2,size);
    if(item.count>1){ctx.fillStyle='#FFF';ctx.font=`bold 10px Courier New`;ctx.textAlign='right';ctx.fillText(item.count,x+size,y+size);}
  } else if(item.type==='food') {
    ctx.fillStyle=item.color||'#EE2200';ctx.fillRect(x,y,size,size);
    ctx.font=`${size*0.6}px serif`;ctx.textAlign='center';ctx.fillText(item.icon||'?',x+size/2,y+size*0.7);
    if(item.count>1){ctx.fillStyle='#FFF';ctx.font=`bold 10px Courier New`;ctx.textAlign='right';ctx.fillText(item.count,x+size,y+size);}
  } else {
    const icons={w_sword:'⚔',s_sword:'⚔',i_sword:'⚔',d_sword:'💎',bow:'🏹',w_pick:'⛏',s_pick:'⛏',i_pick:'⛏',w_axe:'🪓',s_axe:'🪓',i_axe:'🪓'};
    ctx.font=`${size*0.6}px serif`;ctx.textAlign='center';ctx.fillText(icons[item.id]||'?',x+size/2,y+size*0.7);
  }
}

function drawHealth() {
  const hx=10,hy=Hpx-98;
  ctx.fillStyle='#FFF';ctx.font='bold 10px Courier New';ctx.textAlign='left';ctx.fillText('❤',hx,hy);
  for(let i=0;i<player.maxHealth/2;i++){
    const bx=hx+16+i*19, by=hy-12;
    ctx.fillStyle=i<Math.floor(player.health/2)?'#CC0000':i<player.health/2?'#FF6666':'#444';
    ctx.fillRect(bx,by,15,13);
    ctx.fillStyle=i<player.health/2?'#880000':'#2A2A2A';ctx.fillRect(bx+2,by+2,11,9);
  }
}

function drawFood() {
  const hx=10,hy=Hpx-74;
  ctx.fillStyle='#FFF';ctx.font='bold 10px Courier New';ctx.textAlign='left';ctx.fillText('🍗',hx,hy);
  for(let i=0;i<player.maxFood/2;i++){
    const bx=hx+20+i*19, by=hy-12;
    const pct=player.food/2;
    ctx.fillStyle=i<Math.floor(pct)?'#AA6600':i<pct?'#CC8800':'#444';
    ctx.fillRect(bx,by,15,13);
    ctx.fillStyle=i<pct?'#773300':'#2A2A2A';ctx.fillRect(bx+2,by+2,11,9);
  }
  // Hunger warning
  if(player.food<6&&tick%30<15){ctx.fillStyle='#FF8800';ctx.font='bold 11px Courier New';ctx.textAlign='left';ctx.fillText('⚠ Hungry! Press G to eat',hx,hy+14);}
}

function drawXPBar() {
  const bw=220,hx=Wpx/2-bw/2,hy=Hpx-120;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(hx,hy,bw,7);
  const xpN=(player.xp%Math.max(1,(player.level+1)*50))/Math.max(1,(player.level+1)*50);
  ctx.fillStyle='#00EE00';ctx.fillRect(hx,hy,bw*xpN,7);
  ctx.fillStyle='#FFF';ctx.font='10px Courier New';ctx.textAlign='center';
  ctx.fillText(`Lv${player.level} | ${player.xp} XP`,Wpx/2,hy-2);
}

function drawClock() {
  const n=(time%DAY)/DAY;
  const hr=Math.floor(n*24),mn=Math.floor((n*24-hr)*60);
  const ts=`${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  const isDay=getDayF()>0.08;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(Wpx-130,6,124,24);
  ctx.fillStyle=isDay?'#FFD700':'#AAAAFF';ctx.font='bold 13px Courier New';ctx.textAlign='right';
  ctx.fillText((isDay?'☀ ':'☾ ')+ts,Wpx-8,23);
}

function drawBiomeTag() {
  const bio=getBiome(Math.floor((player.x+cam.x)/BS));
  const biomeNames={plains:'🌿 Plains',forest:'🌲 Forest',desert:'🏜 Desert',mountain:'⛰ Mountain'};
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(Wpx-130,34,124,20);
  ctx.fillStyle='#AEF';ctx.font='11px Courier New';ctx.textAlign='right';
  ctx.fillText(biomeNames[bio]||bio,Wpx-8,48);
}

function drawMsgs() {
  const now=Date.now();
  msgs=msgs.filter(m=>now-m.t<5000);
  msgs.slice(-7).forEach((m,i)=>{
    const age=(now-m.t)/5000, op=Math.max(0,1-age*2.2);
    ctx.globalAlpha=op;
    ctx.font='12px Courier New';ctx.textAlign='left';
    const tw=ctx.measureText(m.text).width;
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(6,Hpx/2-100+i*18,tw+10,15);
    ctx.fillStyle='#FFF';ctx.fillText(m.text,10,Hpx/2-88+i*18);
    ctx.globalAlpha=1;
  });
}

function drawCross() {
  const cx=Wpx/2,cy=Hpx/2;
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-12,cy);ctx.lineTo(cx+12,cy);ctx.moveTo(cx,cy-12);ctx.lineTo(cx,cy+12);ctx.stroke();
}

function drawMinimap() {
  const mw=110,mh=64,mx=Wpx-mw-6,my=58;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(mx,my,mw,mh);
  const scaleX=mw/BS/22, scaleY=mh/WH;
  const offX=Math.floor(player.x/BS)-11;
  for(let bx=offX;bx<offX+22;bx++) {
    for(let by=0;by<WH;by++) {
      const b=gB(bx,by);if(!b||!BD[b]||!BD[b].color||b===B.AIR) continue;
      const col=BD[b].top||BD[b].color;
      if(col.startsWith('rgba')||col.startsWith('rgb(30')) continue;
      ctx.fillStyle=col;
      ctx.fillRect(mx+(bx-offX)*scaleX*BS,my+by*scaleY,Math.ceil(scaleX*BS)+1,Math.ceil(scaleY)+1);
    }
  }
  ctx.fillStyle='#FFF';ctx.fillRect(mx+mw/2-2,my+(player.y/BS)*scaleY-1,4,4);
  ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='8px Courier New';ctx.textAlign='left';ctx.fillText('MAP',mx+3,my+10);
  // Coords
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(mx,my+mh+2,mw,14);
  ctx.fillStyle='#AAA';ctx.font='9px Courier New';ctx.textAlign='center';
  ctx.fillText(`X:${Math.floor(player.x/BS)} Y:${Math.floor(player.y/BS)}`,mx+mw/2,my+mh+12);
}

function drawControls() {
  const lines=['WASD=Move','Space=Jump','LClick=Mine','RClick=Place/Talk','F=Attack','G=Eat','E=Inventory','T=Toolbox','Q=Drop','R=Respawn'];
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(5,5,140,lines.length*14+8);
  ctx.font='9px Courier New';ctx.textAlign='left';
  lines.forEach((l,i)=>{ctx.fillStyle='#AAA';ctx.fillText(l,10,18+i*14);});
}

function drawInventory() {
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,Wpx,Hpx);
  const iw=470,ih=400,ix=Wpx/2-iw/2,iy=Hpx/2-ih/2;
  ctx.fillStyle='#5A5A5A';ctx.fillRect(ix,iy,iw,ih);
  ctx.fillStyle='#444';ctx.fillRect(ix+4,iy+4,iw-8,ih-8);
  ctx.fillStyle='#FFF';ctx.font='bold 16px Courier New';ctx.textAlign='center';ctx.fillText('⊞ INVENTORY',Wpx/2,iy+24);
  ctx.fillStyle='#999';ctx.font='10px Courier New';ctx.fillText('E=close | 1-9=slot | RClick=place | G=eat held | T=Toolbox',Wpx/2,iy+40);

  const SZ=42,gx=ix+12,gy=iy+50;
  for(let row=0;row<4;row++) for(let col=0;col<9;col++) {
    const idx=row*9+col, sx=gx+col*SZ, sy=gy+row*SZ;
    ctx.fillStyle=idx===player.hotbar?'rgba(255,255,150,0.18)':'rgba(0,0,0,0.4)';
    ctx.fillRect(sx+1,sy+1,SZ-2,SZ-2);
    ctx.strokeStyle='#777';ctx.lineWidth=1;ctx.strokeRect(sx,sy,SZ,SZ);
    if(player.inventory[idx]) drawItemSlot(player.inventory[idx],sx+4,sy+4,SZ-8);
    ctx.fillStyle='#666';ctx.font='8px Courier New';ctx.textAlign='left';ctx.fillText(idx<9?idx+1:'',sx+2,sy+SZ-2);
  }

  // Process inventory clicks
  if(invClick) {
    const ic=invClick; invClick=null;
    for(let row=0;row<4;row++) for(let col=0;col<9;col++){
      const idx=row*9+col, sx=gx+col*SZ, sy=gy+row*SZ;
      if(ic.x>sx&&ic.x<sx+SZ&&ic.y>sy&&ic.y<sy+SZ) {
        const item=player.inventory[idx];
        if(item) {
          if(item.type==='food') {player.hotbar=idx;eatHeld();}
          else {player.hotbar=idx%9;msg(`Selected: ${item.name||(BD[item.id]&&BD[item.id].name)||'?'}`);}
        }
      }
    }
  }

  // Food info panel
  ctx.fillStyle='#FFF';ctx.font='bold 12px Courier New';ctx.textAlign='left';
  ctx.fillText('🍴 Foods in inventory:',ix+12,iy+226);
  let fx=ix+12, fi=0;
  player.inventory.forEach((item,i)=>{
    if(!item||item.type!=='food') return;
    const fd=item;
    const rx=fx+fi*155, ry=iy+232;
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(rx,ry,148,52);
    ctx.fillStyle=fd.color||'#AA3322';ctx.fillRect(rx,ry,148,52);
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(rx,ry,148,52);
    ctx.font='${fd.icon?28:16}px serif';ctx.textAlign='center';ctx.fillText(fd.icon||'🍴',rx+74,ry+28);
    ctx.font='bold 10px Courier New';ctx.fillStyle='#FFF';ctx.fillText(`${fd.name} x${fd.count}`,rx+74,ry+42);
    ctx.fillStyle='#AFA';ctx.font='9px Courier New';ctx.fillText(`+${fd.restore} food | Slot ${i+1}`,rx+74,ry+52);
    fi++;
  });
  if(fi===0){ctx.fillStyle='#888';ctx.font='11px Courier New';ctx.textAlign='left';ctx.fillText('No food! Mine leaves for apples, kill animals for meat.',ix+12,iy+262);}
}

function drawToolbox() {
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,Wpx,Hpx);
  const tw=520,th=480,tx=Wpx/2-tw/2,ty=Hpx/2-th/2;
  ctx.fillStyle='#4A3A2A';ctx.fillRect(tx,ty,tw,th);
  ctx.fillStyle='#382A1A';ctx.fillRect(tx+4,ty+4,tw-8,th-8);
  ctx.fillStyle='#FFE082';ctx.font='bold 18px Courier New';ctx.textAlign='center';ctx.fillText('⚒ TOOLBOX & CRAFTING',Wpx/2,ty+26);
  ctx.fillStyle='#AA8855';ctx.font='10px Courier New';ctx.fillText('T=close | Scroll=navigate | Click [CRAFT] to craft',Wpx/2,ty+42);

  // Categories filter
  const cats=['All','Materials','Weapons','Tools','Food'];
  cats.forEach((c,i)=>{
    const bx=tx+12+i*96, by=ty+50;
    ctx.fillStyle=toolCat===c?'#CC9933':'#5A4A2A';ctx.fillRect(bx,by,88,20);
    ctx.fillStyle=toolCat===c?'#000':'#FFE';ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.fillText(c,bx+44,by+14);
    if(toolClick&&toolClick.x>bx&&toolClick.x<bx+88&&toolClick.y>by&&toolClick.y<by+20){toolCat=c;toolClick=null;}
  });

  const filtered=RECIPES.filter(r=>toolCat==='All'||r.cat===toolCat);
  const RSLOT=58, MAX_VIS=Math.floor((th-95)/RSLOT);
  toolScroll=Math.max(0,Math.min(toolScroll,Math.max(0,filtered.length-MAX_VIS)));
  const vis=filtered.slice(toolScroll,toolScroll+MAX_VIS);
  const listY=ty+76;

  vis.forEach((r,i)=>{
    const ry=listY+i*RSLOT;
    const craftable=canCraft(r);
    ctx.fillStyle=craftable?'rgba(0,80,0,0.5)':'rgba(40,40,40,0.5)';ctx.fillRect(tx+10,ry,tw-20,RSLOT-4);
    ctx.strokeStyle=craftable?'#4CAF50':'#555';ctx.lineWidth=1;ctx.strokeRect(tx+10,ry,tw-20,RSLOT-4);

    // Result icon
    const res=r.result;
    if(res.type==='block'&&BD[res.id]&&BD[res.id].color){
      ctx.fillStyle=BD[res.id].color;ctx.fillRect(tx+16,ry+8,36,36);
      if(BD[res.id].top&&BD[res.id].top!==BD[res.id].color){ctx.fillStyle=BD[res.id].top;ctx.fillRect(tx+16,ry+8,36,5);}
    } else if(res.type==='food') {
      ctx.fillStyle=res.color||'#AA3322';ctx.fillRect(tx+16,ry+8,36,36);
      ctx.font='20px serif';ctx.textAlign='center';ctx.fillText(res.icon||'?',tx+34,ry+32);
    } else {
      ctx.fillStyle='#333';ctx.fillRect(tx+16,ry+8,36,36);
      const icons2={w_sword:'⚔',s_sword:'⚔',i_sword:'⚔',d_sword:'💎',bow:'🏹',w_pick:'⛏',s_pick:'⛏',i_pick:'⛏',w_axe:'🪓',s_axe:'🪓',i_axe:'🪓'};
      ctx.font='20px serif';ctx.textAlign='center';ctx.fillText(icons2[res.id]||'?',tx+34,ry+32);
    }
    ctx.fillRect(tx+16,ry+8,36,36);

    // Name + result
    ctx.fillStyle=craftable?'#FFE082':'#AAA';ctx.font='bold 12px Courier New';ctx.textAlign='left';
    ctx.fillText(r.name,tx+60,ry+18);
    ctx.fillStyle='#888';ctx.font='9px Courier New';ctx.fillText(`→ ${res.count}x | ${r.cat}`,tx+60,ry+30);

    // Requirements
    let reqX=tx+60;
    r.req.forEach(rq=>{
      const have=countInInv(rq.id);
      const ok=have>=rq.count;
      const nm=BD[rq.id]?BD[rq.id].name:'?';
      ctx.fillStyle=ok?'#88FF88':'#FF8888';ctx.font='9px Courier New';
      ctx.fillText(`${nm}: ${have}/${rq.count}`,reqX,ry+43);
      reqX+=130;
    });

    // Craft button
    const bx=tx+tw-80, bby=ry+10;
    ctx.fillStyle=craftable?'#2E7D32':'#555';ctx.fillRect(bx,bby,68,36);
    ctx.fillStyle=craftable?'#FFF':'#888';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.fillText('CRAFT',bx+34,bby+23);
    if(toolClick&&toolClick.x>bx&&toolClick.x<bx+68&&toolClick.y>bby&&toolClick.y<bby+36){doCraft(r);toolClick=null;}
  });

  // Scrollbar
  if(filtered.length>MAX_VIS){
    const sh=th-95, sb=tx+tw-18, sy2=ty+76;
    ctx.fillStyle='#333';ctx.fillRect(sb,sy2,10,sh);
    const sbh=Math.max(30,sh*MAX_VIS/filtered.length);
    const sbY=sy2+toolScroll/Math.max(1,filtered.length-MAX_VIS)*(sh-sbh);
    ctx.fillStyle='#AA8844';ctx.fillRect(sb,sbY,10,sbh);
  }
  toolClick=null;
}

let toolCat='All';

function drawDeath() {
  ctx.fillStyle='rgba(180,0,0,0.6)';ctx.fillRect(0,0,Wpx,Hpx);
  ctx.fillStyle='#FFF';ctx.font='bold 56px Courier New';ctx.textAlign='center';ctx.fillText('YOU DIED',Wpx/2,Hpx/2-50);
  ctx.font='22px Courier New';ctx.fillText('Press R to Respawn',Wpx/2,Hpx/2+20);
  ctx.fillStyle='#FFAAAA';ctx.font='14px Courier New';ctx.fillText('Score: '+player.xp+' XP | Level '+player.level,Wpx/2,Hpx/2+60);
}

function msg(t) {msgs.push({text:t.substring(0,65),t:Date.now()});if(msgs.length>40)msgs.shift();}

/* ============ INPUT ============ */
/* ============ MOBILE TOUCH CONTROLS ============ */

// 1. Link Movement Buttons to Keyboard Keys
function bindHoldBtn(id, key) {
  const el = document.getElementById(id);
  if(!el) return;
  const press = (e) => { e.preventDefault(); keys[key] = true; };
  const release = (e) => { e.preventDefault(); keys[key] = false; };
  
  el.addEventListener('touchstart', press, {passive: false});
  el.addEventListener('touchend', release);
}
bindHoldBtn('b-left', 'ArrowLeft');
bindHoldBtn('b-right', 'ArrowRight');
bindHoldBtn('b-up', 'Space');

// 2. Link Action Buttons to Game Functions
function bindClickBtn(id, action) {
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, {passive: false});
}
bindClickBtn('b-atk', () => { player.atk = 10; attackNearby(); });
bindClickBtn('b-place', interactNearby);
bindClickBtn('b-eat', eatHeld);

// 3. Handle Canvas Touching (Mining and Hotbar selection)
window.addEventListener('touchstart', e => {
  // Ignore if we are touching a UI button
  if(e.target.closest('#mobile-ui')) return; 
  
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
  
  // Check if player tapped the Hotbar UI
  const hbY = Hpx - 60;
  const hbX = Wpx / 2 - 180;
  if(mouse.y > hbY - 10 && mouse.x > hbX && mouse.x < hbX + 370) {
    const slot = Math.floor((mouse.x - hbX) / 40);
    if(slot >= 0 && slot < 9) player.hotbar = slot;
    return; // Don't swing pickaxe if selecting inventory
  }
  
  // Otherwise, start mining
  mouse.left = true;
}, {passive: false});

window.addEventListener('touchmove', e => {
  if(e.target.closest('#mobile-ui')) return;
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
}, {passive: false});

window.addEventListener('touchend', e => {
  mouse.left = false;
});




function setupInput() {
  window.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(e.code.startsWith('Digit')){const n=parseInt(e.key)-1;if(n>=0&&n<9)player.hotbar=n;}
    if(e.code==='KeyE'){showInv=!showInv;showTool=false;}
    if(e.code==='KeyT'){showTool=!showTool;showInv=false;}
    if(e.code==='KeyR'&&player.dead) respawn();
    if((e.code==='KeyF'||e.code==='KeyZ')&&!showInv&&!showTool) attackNearby();
    if(e.code==='KeyG') eatHeld();
    if(e.code==='KeyQ'){const item=player.inventory[player.hotbar];if(item){msg('Dropped: '+(item.name||(BD[item.id]&&BD[item.id].name)||'?'));player.inventory[player.hotbar]=null;}}
    e.preventDefault();
  });
  window.addEventListener('keyup',e=>keys[e.code]=false);

  cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;});
  cv.addEventListener('mousedown',e=>{
    const r=cv.getBoundingClientRect();
    const cx=e.clientX-r.left, cy=e.clientY-r.top;
    if(e.button===0){
      mouse.left=true;
      if(showInv) invClick={x:cx,y:cy};
      else if(showTool) toolClick={x:cx,y:cy};
    }
    if(e.button===2&&!showInv&&!showTool) interactNearby();
  });
  cv.addEventListener('mouseup',e=>{if(e.button===0)mouse.left=false;});
  cv.addEventListener('contextmenu',e=>e.preventDefault());
  cv.addEventListener('wheel',e=>{
    if(showTool){toolScroll+=e.deltaY>0?1:-1;return;}
    player.hotbar=(player.hotbar+(e.deltaY>0?1:-1)+9)%9;
  });
}

/* ============ GAME LOOP ============ */
function loop() {
  tick++;
  time+=1.2;
  if(time>=DAY) time=0;
  const xpNeed=(player.level+1)*50;
  if(player.xp>=xpNeed){player.level++;msg('🌟 Level Up! You are Level '+player.level+'!');}
  if(!showInv&&!showTool&&!player.dead){updPlayer();updEntities();updArrows();}
  else if(player.dead&&keys['KeyR']) respawn();
  render();
  requestAnimationFrame(loop);
}

/* ============ INIT ============ */
function init() {
  cv=document.getElementById('g');
  ctx=cv.getContext('2d');
  Wpx=window.innerWidth; Hpx=window.innerHeight;
  cv.width=Wpx; cv.height=Hpx;
  window.addEventListener('resize',()=>{Wpx=window.innerWidth;Hpx=window.innerHeight;cv.width=Wpx;cv.height=Hpx;});

  // Pre-gen starting area
  for(let i=-5;i<=5;i++) ens(i);

  player=mkPlayer();
  player.x=0; const sy=tH(0); player.y=(sy-4)*BS;
  giveStarter(player);
  spawnInitial();
  setupInput();

  msg('🌍 Welcome to CraftWorld Infinite!');
  msg('WASD=Move | LClick=Mine | RClick=Place/Talk to mobs');
  msg('F=Attack | G=Eat food | E=Inventory | T=Toolbox ⚒');
  msg('Walk left/right to explore INFINITE world with biomes! →');
  requestAnimationFrame(loop);
}

window.onload=init;
</script>
